services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-app
    container_name: erp-app
    ports:
      - "8080:80"
    env_file:
      - .env.docker
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: erp-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: maestro_panadero
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - "C:/DOCKER/MYSQL/VOLUMEN:/var/lib/mysql"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: erp-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 128M
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped